<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Payo WFM — Performance Management module</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="tokens.css">

<style>
/* Design canvas chrome — light soft background */
html, body { background: #F1EFEC; }
</style>

</head>
<body>

<div id="root"></div>

<!-- React + Babel -->
<script src="vendor/react.js"></script>
<script src="vendor/react-dom.js"></script>
<script src="vendor/babel.js"></script>

<!-- Design canvas -->
<script type="text/babel" src="design-canvas.jsx"></script>

<!-- Shared shell + components -->
<script type="text/babel" src="shared.jsx"></script>

<!-- Shared sub-screens -->
<script type="text/babel" src="frames/goal-detail.jsx"></script>
<script type="text/babel" src="frames/goal-stepper.jsx"></script>
<script type="text/babel" src="frames/meeting-notes.jsx"></script>

<!-- Client screens -->
<script type="text/babel" src="frames/client-dashboard.jsx"></script>
<script type="text/babel" src="frames/client-okrs.jsx"></script>
<script type="text/babel" src="frames/client-meetings.jsx"></script>
<script type="text/babel" src="frames/client-reviews.jsx"></script>

<!-- Worker screens -->
<script type="text/babel" src="frames/worker-dashboard.jsx"></script>
<script type="text/babel" src="frames/worker-goals.jsx"></script>
<script type="text/babel" src="frames/worker-meetings.jsx"></script>
<script type="text/babel" src="frames/worker-reviews.jsx"></script>

<!-- Admin -->
<script type="text/babel" src="frames/admin-dashboard.jsx"></script>

<!-- Root -->
<script type="text/babel">
function Root() {
  return (
    <DesignCanvas initialZoom={0.45}>
      <DCSection
        id="client"
        title="Client / Manager view"
        subtitle="HR admin or people manager at the client (Acme Holdings). Performance is a top-level item with horizontal tab navigation underneath."
      >
        <DCArtboard id="client-dashboard" label="01 · Manager — Performance dashboard" width={1440} height={2080}>
          <ClientDashboard />
        </DCArtboard>
        <DCArtboard id="client-okrs" label="02 · Goals & OKRs — Company / My / People + Create" width={1440} height={2300}>
          <ClientOKRs />
        </DCArtboard>
        <DCArtboard id="client-create-goal" label="02b · Create Goal — 5-step stepper" width={1440} height={1280}>
          <Shell persona="client" active="performance" crumb={['Acme Holdings', 'Performance', 'Goals & OKRs', 'New Goal']}>
            <GoalStepper kind="goal" onCancel={() => {}} onCreate={() => {}} />
          </Shell>
        </DCArtboard>
        <DCArtboard id="client-goal-detail" label="02c · Goal Detail — KRs, Tracking, Owner, Attachments" width={1440} height={1480}>
          <Shell persona="client" active="performance" crumb={['Acme Holdings', 'Performance', 'Goals & OKRs', 'Build a Scalable Operations Engine…']}>
            <GoalDetail role="manager" onBack={() => {}} />
          </Shell>
        </DCArtboard>
        <DCArtboard id="client-reviews" label="03 · Reviews — pick a worker, view history, write a review" width={1440} height={1320}>
          <ClientReviews />
        </DCArtboard>
        <DCArtboard id="client-meetings" label="04 · 1:1 Meetings — day-wise layout" width={1440} height={2120}>
          <ClientMeetings />
        </DCArtboard>
        <DCArtboard id="client-notes" label="04b · 1:1 Notes editor — Shared + Private with action items" width={1440} height={1500}>
          <Shell persona="client" active="performance" crumb={['Acme Holdings', 'Performance', '1:1 Meetings', 'Notes — Aditi Sharma']}>
            <MeetingNotesEditor
              worker="Aditi Sharma"
              role="Senior Ops · weekly"
              linked={[
                { icon: 'flag',          label: 'Complete 6 migrations' },
                { icon: 'rocket_launch', label: 'Payroll Migration EU' },
              ]}
              onBack={() => {}}
            />
          </Shell>
        </DCArtboard>
      </DCSection>

      <DCSection
        id="admin"
        title="Internal Team / Admin view"
        subtitle="Payoneer internal Performance Ops. Pick any client and view their workspace exactly as they see it — logged, read-only access."
      >
        <DCArtboard id="admin-dashboard" label="05 · Internal Admin — Clients overview" width={1440} height={1640}>
          <AdminDashboard />
        </DCArtboard>
      </DCSection>

      <DCSection
        id="worker"
        title="Worker view"
        subtitle="Self-service. Sees only their own goals, feedback, reviews and 1:1s."
      >
        <DCArtboard id="worker-dashboard" label="06 · Worker — Dashboard (simplified)" width={1440} height={1500}>
          <WorkerDashboard />
        </DCArtboard>
        <DCArtboard id="worker-goals" label="07 · Worker — My Goals (View opens Goal Detail)" width={1440} height={1660}>
          <WorkerGoals />
        </DCArtboard>
        <DCArtboard id="worker-meetings" label="08 · Worker — My 1:1 sessions" width={1440} height={1740}>
          <WorkerMeetings />
        </DCArtboard>
        <DCArtboard id="worker-reviews" label="09 · Worker — Reviews (date-wise tiles)" width={1440} height={1820}>
          <WorkerReviews />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root />);
</script>

</body>
</html>
